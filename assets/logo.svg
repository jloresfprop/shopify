<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 60" fill="none">
  <!-- Ícono estante -->
  <g transform="translate(0, 8)">
    <!-- Patas verticales -->
    <rect x="4" y="4" width="3" height="40" rx="1.5" fill="#C9A84C"/>
    <rect x="33" y="4" width="3" height="40" rx="1.5" fill="#C9A84C"/>
    <!-- Estante superior -->
    <rect x="2" y="4" width="36" height="3.5" rx="1.5" fill="#C9A84C"/>
    <!-- Estante medio -->
    <rect x="2" y="21" width="36" height="3" rx="1.5" fill="#C9A84C"/>
    <!-- Estante inferior -->
    <rect x="2" y="38" width="36" height="3.5" rx="1.5" fill="#C9A84C"/>
    <!-- Libros/productos en estante superior -->
    <rect x="8"  y="8"  width="5" height="12" rx="1" fill="#1a1a2e"/>
    <rect x="15" y="9"  width="4" height="11" rx="1" fill="#2a2a3e"/>
    <rect x="21" y="7"  width="6" height="13" rx="1" fill="#1a1a2e"/>
    <rect x="8"  y="26" width="6" height="11" rx="1" fill="#2a2a3e"/>
    <rect x="16" y="25" width="4" height="12" rx="1" fill="#1a1a2e"/>
    <rect x="22" y="27" width="5" height="10" rx="1" fill="#2a2a3e"/>
  </g>

  <!-- Texto EL ESTANTE -->
  <text x="52" y="30"
    font-family="'Georgia', serif"
    font-size="22"
    font-weight="700"
    letter-spacing="3"
    fill="#1a1a2e">EL ESTANTE</text>

  <!-- Línea dorada decorativa -->
  <line x1="52" y1="35" x2="210" y2="35" stroke="#C9A84C" stroke-width="1.2"/>

  <!-- Subtexto CHILE -->
  <text x="52" y="48"
    font-family="'Georgia', serif"
    font-size="10"
    letter-spacing="6"
    fill="#C9A84C">C H I L E</text>
</svg>

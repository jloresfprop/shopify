name: Órdenes ML (cada 30min)

on:
  schedule:
    - cron: '*/30 * * * *'  # cada 30 minutos
  workflow_dispatch:

jobs:
  orders:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Instalar dependencias
        run: npm ci --omit=dev

      - name: Crear .env
        run: |
          cat > .env << 'EOF'
          SHOPIFY_STORE=${{ secrets.SHOPIFY_STORE }}
          SHOPIFY_TOKEN=${{ secrets.SHOPIFY_TOKEN }}
          ML_CLIENT_ID=${{ secrets.ML_CLIENT_ID }}
          ML_CLIENT_SECRET=${{ secrets.ML_CLIENT_SECRET }}
          ML_SITE_ID=${{ secrets.ML_SITE_ID }}
          ML_USER_ID=${{ secrets.ML_USER_ID }}
          ML_USER_TOKEN=${{ secrets.ML_USER_TOKEN }}
          ML_REFRESH_TOKEN=${{ secrets.ML_REFRESH_TOKEN }}
          ML_TOKEN_EXPIRES_AT=${{ secrets.ML_TOKEN_EXPIRES_AT }}
          GOOGLE_SHEET_ID=${{ secrets.GOOGLE_SHEET_ID }}
          TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID=${{ secrets.TELEGRAM_CHAT_ID }}
          EOF

      - name: Crear credenciales Google
        run: echo '${{ secrets.GOOGLE_CREDENTIALS_JSON }}' > el-estante-cl.json

      - name: Revisar órdenes ML
        run: node scripts/auto-sync.js --orders-only

      - name: Guardar órdenes procesadas
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ml-processed-orders.json ml-mapping.json 2>/dev/null || true
          git diff --staged --quiet && echo "Sin cambios" && exit 0
          git commit -m "chore: órdenes $(date -u '+%Y-%m-%d %H:%M')"
          git pull --rebase origin main
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git HEAD:main

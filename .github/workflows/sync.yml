name: Sync Completo (cada 6h)

on:
  # schedule:
  #   - cron: '0 */6 * * *'   # cada 6 horas — PAUSADO
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Instalar dependencias
        run: npm ci --omit=dev

      - name: Crear .env
        run: |
          cat > .env << 'EOF'
          SHOPIFY_STORE=${{ secrets.SHOPIFY_STORE }}
          SHOPIFY_TOKEN=${{ secrets.SHOPIFY_TOKEN }}
          SHOPIFY_API_KEY=${{ secrets.SHOPIFY_API_KEY }}
          SHOPIFY_API_SECRET=${{ secrets.SHOPIFY_API_SECRET }}
          SCOPES=${{ secrets.SCOPES }}
          ML_CLIENT_ID=${{ secrets.ML_CLIENT_ID }}
          ML_CLIENT_SECRET=${{ secrets.ML_CLIENT_SECRET }}
          ML_SITE_ID=${{ secrets.ML_SITE_ID }}
          ML_USER_ID=${{ secrets.ML_USER_ID }}
          ML_USER_TOKEN=${{ secrets.ML_USER_TOKEN }}
          ML_REFRESH_TOKEN=${{ secrets.ML_REFRESH_TOKEN }}
          ML_TOKEN_EXPIRES_AT=${{ secrets.ML_TOKEN_EXPIRES_AT }}
          GOOGLE_SHEET_ID=${{ secrets.GOOGLE_SHEET_ID }}
          DROPI_TOKEN=${{ secrets.DROPI_TOKEN }}
          DROPI_STORE_ID=${{ secrets.DROPI_STORE_ID }}
          DROPI_USER_TOKEN=${{ secrets.DROPI_USER_TOKEN }}
          DROPI_EMAIL=${{ secrets.DROPI_EMAIL }}
          DROPI_PASSWORD=${{ secrets.DROPI_PASSWORD }}
          ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}
          AI_MONTHLY_BUDGET_USD=${{ secrets.AI_MONTHLY_BUDGET_USD }}
          EOF

      - name: Crear credenciales Google
        run: echo '${{ secrets.GOOGLE_CREDENTIALS_JSON }}' > el-estante-cl.json

      - name: Ejecutar sync completo
        run: node scripts/auto-sync.js --no-images

      - name: Guardar estado
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ml-mapping.json ml-images-cache.json ml-processed-orders.json 2>/dev/null || true
          git diff --staged --quiet && echo "Sin cambios" && exit 0
          git commit -m "chore: estado sync $(date -u '+%Y-%m-%d %H:%M')"
          git pull --rebase origin main
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git HEAD:main
